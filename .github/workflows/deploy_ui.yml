name: Deploy Dashboard to HuggingFace Spaces

# Gated on CI: this runs only AFTER the "CI" workflow completes successfully on
# main, so a dashboard with failing tests is never shipped to HuggingFace.
# (Previously this triggered directly on push, racing CI in parallel — a broken
#  build could deploy even when tests failed.)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-ui:
    runs-on: ubuntu-latest
    # Deploy only when CI passed (workflow_run) or when manually dispatched.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5
        with:
          # For workflow_run, check out the exact commit CI validated.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 2   # need the parent to diff changed files

      - name: Check whether dashboard files changed
        id: changed
        run: |
          # Manual dispatch always deploys. Otherwise only rebuild the Space when
          # the dashboard entry point or its data layer changed in this commit.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying."
          elif git diff --name-only HEAD~1 HEAD \
                | grep -Eq '^(dashboard/|database/|bot/|scheduler/|requirements_space\.txt|config\.py)'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "Dashboard/requirements/config changed — deploying."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "No dashboard changes in this commit — skipping deploy."
          fi

      - name: Set up Python
        if: steps.changed.outputs.deploy == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install huggingface-hub
        if: steps.changed.outputs.deploy == 'true'
        run: pip install "huggingface-hub>=0.20.0"

      - name: Deploy to HuggingFace Spaces
        if: steps.changed.outputs.deploy == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          # Pushed to the Space as secrets so the dashboard can use Alpaca's
          # official market-data API for live prices / SPY (instead of yfinance).
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: |
          python - <<'PYEOF'
          import os, sys, shutil
          from pathlib import Path
          from huggingface_hub import HfApi

          token    = os.environ.get("HF_TOKEN", "")
          space_id = os.environ.get("HF_SPACE_ID", "")

          if not token or not space_id:
              print("::error::HF_TOKEN or HF_SPACE_ID secret is not set.")
              print("Add HF_SPACE_ID=ksri77/ai-trading-bot in GitHub repo Settings → Secrets.")
              sys.exit(1)

          # Stage all files the Space needs to run the Gradio dashboard
          staging = Path("/tmp/hf_space")
          if staging.exists():
              shutil.rmtree(staging)
          staging.mkdir()

          # dashboard/app.py → app.py  (Gradio Spaces entry point)
          shutil.copy("dashboard/app.py", staging / "app.py")

          # Full dashboard package (app.py imports design_system, layout, data, charts, components/*)
          shutil.copytree("dashboard", staging / "dashboard",
                          ignore=shutil.ignore_patterns("__pycache__"))

          # database package (dashboard components import analytics_service, analytics_repository)
          shutil.copytree("database", staging / "database",
                          ignore=shutil.ignore_patterns("__pycache__", "*.duckdb"))

          # Full bot package (dashboard imports from many submodules)
          shutil.copytree("bot", staging / "bot",
                          ignore=shutil.ignore_patterns("__pycache__"))

          # Scheduler package (dispatcher, health_monitor, session_manager, jobs)
          shutil.copytree("scheduler", staging / "scheduler",
                          ignore=shutil.ignore_patterns("__pycache__"))

          # config.py + minimal Space-only requirements (no ML/trading packages)
          shutil.copy("config.py",               staging / "config.py")
          shutil.copy("requirements_space.txt",  staging / "requirements.txt")

          # Space metadata — always overwrite so sdk_version stays in sync
          readme = staging / "README.md"
          readme.write_text(
              "---\n"
              "title: AI Trading Bot Dashboard\n"
              "emoji: 📊\n"
              "colorFrom: blue\n"
              "colorTo: indigo\n"
              "sdk: gradio\n"
              "sdk_version: 5.9.0\n"
              "app_file: app.py\n"
              "pinned: false\n"
              "---\n"
          )

          api = HfApi(token=token)
          # Upload everything except README.md — huggingface_hub's upload_folder
          # calls a YAML-validation endpoint for README.md which occasionally
          # returns an empty body, crashing with JSONDecodeError.  upload_file
          # goes through a different code path that doesn't trigger the bug.
          api.upload_folder(
              folder_path=str(staging),
              repo_id=space_id,
              repo_type="space",
              commit_message="chore: update dashboard from CI",
              ignore_patterns=["README.md"],
          )
          try:
              api.upload_file(
                  path_or_fileobj=str(staging / "README.md"),
                  path_in_repo="README.md",
                  repo_id=space_id,
                  repo_type="space",
                  commit_message="chore: update Space card metadata",
              )
          except Exception as e:
              print(f"::warning::README.md upload failed: {e} — Space card metadata may be stale")

          # Push Alpaca credentials as Space secrets so the dashboard can use the
          # official data API for live prices. Skipped cleanly if not provided.
          for k in ("ALPACA_KEY", "ALPACA_SECRET"):
              v = os.environ.get(k, "")
              if v:
                  try:
                      api.add_space_secret(repo_id=space_id, key=k, value=v)
                      print(f"Set Space secret {k}")
                  except Exception as e:
                      print(f"::warning::could not set Space secret {k}: {e}")

          print(f"Dashboard deployed → https://huggingface.co/spaces/{space_id}")
          PYEOF
