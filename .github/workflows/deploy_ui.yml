name: Deploy Dashboard to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - 'scripts/dashboard.py'
      - 'bot/monitor/dashboard_data.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface-hub
        run: pip install "huggingface-hub>=0.20.0"

      - name: Deploy to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'PYEOF'
          import os, sys, shutil
          from pathlib import Path
          from huggingface_hub import HfApi

          token    = os.environ.get("HF_TOKEN", "")
          space_id = os.environ.get("HF_SPACE_ID", "")

          if not token or not space_id:
              print("::error::HF_TOKEN or HF_SPACE_ID secret is not set.")
              print("Add HF_SPACE_ID=ksri77/ai-trading-bot in GitHub repo Settings → Secrets.")
              sys.exit(1)

          # Stage all files the Space needs to run the Gradio dashboard
          staging = Path("/tmp/hf_space")
          if staging.exists():
              shutil.rmtree(staging)
          staging.mkdir()

          # dashboard.py → app.py  (Gradio Spaces entry point)
          shutil.copy("scripts/dashboard.py", staging / "app.py")

          # Full bot package (dashboard imports from many submodules)
          shutil.copytree("bot", staging / "bot")

          # config.py + minimal Space-only requirements (no ML/trading packages)
          shutil.copy("config.py",               staging / "config.py")
          shutil.copy("requirements_space.txt",  staging / "requirements.txt")

          # Space metadata (creates the Space as a Gradio app on first deploy)
          readme = staging / "README.md"
          if not readme.exists():
              readme.write_text(
                  "---\n"
                  "title: AI Trading Bot Dashboard\n"
                  "emoji: 📊\n"
                  "colorFrom: blue\n"
                  "colorTo: indigo\n"
                  "sdk: gradio\n"
                  "sdk_version: 5.0.0\n"
                  "app_file: app.py\n"
                  "pinned: false\n"
                  "---\n"
              )

          api = HfApi(token=token)
          api.upload_folder(
              folder_path=str(staging),
              repo_id=space_id,
              repo_type="space",
              commit_message="chore: update dashboard from CI",
          )
          print(f"Dashboard deployed → https://huggingface.co/spaces/{space_id}")
          PYEOF
