name: Trading Bot

on:
  schedule:
    # Fire once at market open Mon-Fri (9:30am ET = 13:30 UTC)
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore trade database
        uses: actions/cache/restore@v4
        with:
          path: trades.db
          key: trades-db-${{ github.run_id }}
          restore-keys: trades-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-finbert-v1

      - name: Pull model from HuggingFace
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/load_model_hf.py

      - name: Run trading loop (market open to close)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TRADING_MODE: paper
          PYTHONUNBUFFERED: "1"
        run: |
          python - <<'PYEOF'
          import subprocess, time, datetime, os, sys
          from zoneinfo import ZoneInfo

          def market_open():
              et = datetime.datetime.now(ZoneInfo("America/New_York"))
              if et.weekday() >= 5:
                  return False
              open_t = et.replace(hour=9, minute=30, second=0, microsecond=0)
              close_t = et.replace(hour=16, minute=0, second=0, microsecond=0)
              return open_t <= et < close_t

          def push_hf():
              token = os.environ.get("HF_TOKEN", "")
              repo = os.environ.get("HF_REPO_ID", "")
              if not token or not repo or not os.path.exists("trades.db"):
                  return
              try:
                  from huggingface_hub import HfApi, CommitOperationAdd
                  HfApi(token=token).create_commit(
                      repo_id=repo, repo_type="model",
                      operations=[CommitOperationAdd(path_in_repo="trades.db", path_or_fileobj="trades.db")],
                      commit_message="update trades.db",
                  )
                  print("trades.db pushed to HuggingFace", flush=True)
              except Exception as e:
                  print(f"HF push skipped: {e}", flush=True)

          cycle = 0
          while market_open():
              cycle += 1
              et_str = datetime.datetime.now(ZoneInfo("America/New_York")).strftime("%H:%M ET")
              print(f"\n=== Cycle {cycle} | {et_str} ===", flush=True)
              r = subprocess.run([sys.executable, "bot/main.py", "--mode", "paper"])
              if r.returncode != 0:
                  print(f"::warning::Cycle {cycle} exited with code {r.returncode}", flush=True)
              push_hf()
              # Sleep in 30s chunks so market-close is detected promptly
              for _ in range(10):
                  time.sleep(30)
                  if not market_open():
                      break

          print("\nMarket closed — trading loop complete.", flush=True)
          PYEOF

      - name: Save trade database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: trades.db
          key: trades-db-${{ github.run_id }}
