name: Trading Bot

on:
  schedule:
    # The bot is ONE long-running job that loops a trading cycle every ~5 min until
    # market close — not a per-cycle cron. We fire several start times across the
    # session (Mon-Fri, CDT) rather than once, for two reasons:
    #   1. GitHub scheduled workflows are best-effort and frequently delayed by
    #      30 min to several hours (or skipped) — multiple triggers give the bot
    #      several chances to actually start near each slot.
    #   2. GitHub-hosted runners have a hard 6-hour job cap, but the session is
    #      6.5h — so a single run can't cover it. cancel-in-progress makes each new
    #      trigger restart a fresh job (only ever one running), keeping every job
    #      well under the cap while staying continuous.
    # Slots: 8:30, 10:30, 12:30, 2:30 PM CDT  =  13:30, 15:30, 17:30, 19:30 UTC
    - cron: '30 13,15,17,19 * * 1-5'
  workflow_dispatch:
    inputs:
      reset_daily_start:
        description: 'Reset Day P&L baseline (fixes stale daily_start anchor)'
        required: false
        default: false
        type: boolean
      clean_start:
        description: 'FULL RESET — wipe all bot data (reset Alpaca paper account first!)'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: trading-bot
  # Two simultaneous runs would read the same trades.db from HuggingFace, submit duplicate orders,
  # and race to push back — last writer wins and the earlier cycle's trades are lost.
  cancel-in-progress: true

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v5

      - name: Notify workflow started
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping startup alert."
          else
            SLOT=$(TZ=America/Chicago date '+%H:%M CDT')
            RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              --data-urlencode text="🟢 <b>Trading Bot workflow started</b> — triggered at ${SLOT}. ${RUN_URL}" \
              >/dev/null && echo "Startup alert sent." || echo "Startup alert failed."
          fi

      - name: Restore trade database
        uses: actions/cache@v4
        with:
          path: trades.db
          key: trades-db-${{ github.run_id }}
          restore-keys: trades-db-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync trade database from HuggingFace
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          python -c "
          import os, shutil
          token = os.environ.get('HF_TOKEN', '')
          repo = os.environ.get('HF_REPO_ID', '')
          if not token or not repo:
              print('HF secrets not set — keeping cached trades.db')
          else:
              from huggingface_hub import hf_hub_download
              cached = hf_hub_download(repo_id=repo, filename='trades.db', token=token, force_download=True)
              shutil.copy(cached, 'trades.db')
              import sqlite3
              count = sqlite3.connect('trades.db').execute('SELECT COUNT(*) FROM trades').fetchone()[0]
              print(f'trades.db synced from HuggingFace — {count} records')
          "

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-finbert-v1

      - name: Pull model from HuggingFace
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/load_model_hf.py

      - name: Get today's date (cache key)
        id: date
        run: echo "today=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore pre-market screened universe
        id: restore-universe
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: data/universe_today.json
          key: universe-${{ steps.date.outputs.today }}

      - name: Check if cached universe has picks data
        id: check-picks
        if: steps.restore-universe.outputs.cache-hit == 'true'
        run: |
          result=$(python3 -c "
          import json
          try:
              d = json.load(open('data/universe_today.json'))
              print('true' if d.get('picks') else 'false')
          except:
              print('false')
          " 2>/dev/null || echo 'false')
          echo "has_picks=$result" >> $GITHUB_OUTPUT

      - name: Screen universe (pre-market)
        if: steps.restore-universe.outputs.cache-hit != 'true' || steps.check-picks.outputs.has_picks == 'false'
        continue-on-error: true
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p data
          python scripts/screen_universe.py --max 20 --max-per-sector 3

      - name: Prefetch sentiment (pre-market)
        continue-on-error: true
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/prefetch_sentiment.py

      - name: Clean start — wipe all bot data (if requested)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.clean_start == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_DB_REPO_ID }}
        run: python bot/main.py --clean-db

      - name: Reset Day P&L baseline (if requested)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.reset_daily_start == 'true' && github.event.inputs.clean_start != 'true'
        run: python bot/main.py --reset-daily-start

      - name: Run trading loop (market open to close)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          TRADING_MODE: paper
          PAPER_SIM_CAPITAL: "0"
          PYTHONUNBUFFERED: "1"
        run: python bot/main.py --mode paper --loop

      - name: Alert on workflow failure
        if: failure()
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — cannot send failure alert."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SLOT=$(TZ=America/Chicago date '+%H:%M CDT')
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode text="🔴 <b>Trading Bot FAILED</b> at ${SLOT} — a step crashed before the loop started. Full logs: ${RUN_URL}" \
            >/dev/null && echo "Failure alert sent." || echo "Failure alert send failed."

      - name: Send end-of-day summary (safety net)
        if: always()
        continue-on-error: true
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          TRADING_MODE: paper
          PYTHONUNBUFFERED: "1"
        run: python bot/main.py --summary

