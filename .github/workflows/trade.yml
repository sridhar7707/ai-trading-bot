name: Trading Bot

on:
  schedule:
    # Every 5 minutes Mon-Fri 9:30am-4pm EST (14:30-21:00 UTC)
    - cron: '*/5 14-21 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore trade database
        uses: actions/cache/restore@v4
        with:
          path: trades.db
          key: trades-db-${{ github.run_id }}
          restore-keys: trades-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull model from HuggingFace
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/load_model_hf.py

      - name: Run trading cycle
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          TRADING_MODE: paper
          PYTHONUNBUFFERED: "1"
        run: python bot/main.py --mode paper

      - name: Push trade database to HuggingFace
        if: always()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          python -c "
          import os, sys
          if not os.path.exists('trades.db'):
              print('trades.db not found — skipping push')
              sys.exit(0)
          token = os.environ.get('HF_TOKEN', '')
          repo = os.environ.get('HF_REPO_ID', '')
          if not token or not repo:
              print('HF secrets not set — skipping push')
              sys.exit(0)
          from huggingface_hub import HfApi, CommitOperationAdd
          api = HfApi(token=token)
          api.create_commit(
              repo_id=repo, repo_type='model',
              operations=[CommitOperationAdd(path_in_repo='trades.db', path_or_fileobj='trades.db')],
              commit_message='update trades.db'
          )
          print('trades.db pushed to HuggingFace')
          "

      - name: Save trade database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: trades.db
          key: trades-db-${{ github.run_id }}
