name: Trading Bot

on:
  schedule:
    # Fire once at market open Mon-Fri (9:30am ET = 13:30 UTC)
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore trade database
        uses: actions/cache/restore@v4
        with:
          path: trades.db
          key: trades-db-${{ github.run_id }}
          restore-keys: trades-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync trade database from HuggingFace
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          python -c "
          import os, shutil
          token = os.environ.get('HF_TOKEN', '')
          repo = os.environ.get('HF_REPO_ID', '')
          if not token or not repo:
              print('HF secrets not set — keeping cached trades.db')
          else:
              from huggingface_hub import hf_hub_download
              cached = hf_hub_download(repo_id=repo, filename='trades.db', token=token, force_download=True)
              shutil.copy(cached, 'trades.db')
              import sqlite3
              count = sqlite3.connect('trades.db').execute('SELECT COUNT(*) FROM trades').fetchone()[0]
              print(f'trades.db synced from HuggingFace — {count} records')
          "

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-finbert-v1

      - name: Pull model from HuggingFace
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/load_model_hf.py

      - name: Screen universe (pre-market)
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/screen_universe.py --max 25 --max-per-sector 3

      - name: Prefetch sentiment (pre-market)
        continue-on-error: true
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/prefetch_sentiment.py

      - name: Run trading loop (market open to close)
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TRADING_MODE: paper
          PYTHONUNBUFFERED: "1"
        run: |
          python - <<'PYEOF'
          import subprocess, time, datetime, os, sys
          from zoneinfo import ZoneInfo

          # Hardcoded fallback — Alpaca API is authoritative (see market_open below)
          US_MARKET_HOLIDAYS = {
              # 2025
              "2025-01-01", "2025-01-20", "2025-02-17", "2025-04-18",
              "2025-05-26", "2025-06-19", "2025-07-04", "2025-09-01",
              "2025-11-27", "2025-12-25",
              # 2026
              "2026-01-01", "2026-01-19", "2026-02-16", "2026-04-03",
              "2026-05-25", "2026-06-19", "2026-07-03", "2026-09-07",
              "2026-11-26", "2026-12-25",
              # 2027
              "2027-01-01", "2027-01-18", "2027-02-15", "2027-04-02",
              "2027-05-31", "2027-06-18", "2027-07-05", "2027-09-06",
              "2027-11-25", "2027-12-24",
              # 2028
              "2027-12-31", "2028-01-17", "2028-02-21", "2028-04-14",
              "2028-05-29", "2028-06-19", "2028-07-04", "2028-09-04",
              "2028-11-23", "2028-12-25",
          }

          def market_open():
              et = datetime.datetime.now(ZoneInfo("America/New_York"))
              if et.weekday() >= 5:
                  return False
              open_t  = et.replace(hour=9,  minute=30, second=0, microsecond=0)
              close_t = et.replace(hour=16, minute=0,  second=0, microsecond=0)
              if not (open_t <= et < close_t):
                  return False
              # Prefer Alpaca calendar API — authoritative source for holidays
              today_str = et.strftime("%Y-%m-%d")
              try:
                  import alpaca_trade_api as tradeapi
                  api = tradeapi.REST(
                      os.environ.get("ALPACA_KEY", ""),
                      os.environ.get("ALPACA_SECRET", ""),
                      "https://paper-api.alpaca.markets", api_version="v2"
                  )
                  return len(api.get_calendar(start=today_str, end=today_str)) > 0
              except Exception:
                  return today_str not in US_MARKET_HOLIDAYS

          def push_hf():
              token = os.environ.get("HF_TOKEN", "")
              repo = os.environ.get("HF_REPO_ID", "")
              if not token or not repo or not os.path.exists("trades.db"):
                  return
              try:
                  from huggingface_hub import HfApi, CommitOperationAdd
                  HfApi(token=token).create_commit(
                      repo_id=repo, repo_type="model",
                      operations=[CommitOperationAdd(path_in_repo="trades.db", path_or_fileobj="trades.db")],
                      commit_message="update trades.db",
                  )
                  print("trades.db pushed to HuggingFace", flush=True)
              except Exception as e:
                  print(f"HF push skipped: {e}", flush=True)

          cycle = 0
          while market_open():
              cycle += 1
              et_str = datetime.datetime.now(ZoneInfo("America/New_York")).strftime("%H:%M ET")
              print(f"\n=== Cycle {cycle} | {et_str} ===", flush=True)
              r = subprocess.run([sys.executable, "bot/main.py", "--mode", "paper"])
              if r.returncode != 0:
                  print(f"::warning::Cycle {cycle} exited with code {r.returncode}", flush=True)
              push_hf()
              # Sleep in 30s chunks so market-close is detected promptly
              for _ in range(10):
                  time.sleep(30)
                  if not market_open():
                      break

          print("\nMarket closed — trading loop complete.", flush=True)

          # Send end-of-day Telegram summary
          print("Sending end-of-day summary...", flush=True)
          r = subprocess.run([sys.executable, "bot/main.py", "--summary"])
          if r.returncode != 0:
              print(f"::warning::End-of-day summary exited with code {r.returncode}", flush=True)
          push_hf()
          PYEOF

      - name: Save trade database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: trades.db
          key: trades-db-${{ github.run_id }}
