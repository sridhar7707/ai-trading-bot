name: Trading Bot Watchdog

on:
  schedule:
    # Pre-market screener watchdog: fires 60 min after the main screener slot (12:00→13:00 UTC).
    # Checks the last 120 min so it catches runs from the early 11:30 trigger too.
    - cron: '0 13 * * 1-5'
    # Trading bot watchdog: fires 30 min after each trading slot (Mon-Fri)
    # Slot → Watchdog: 13:30→14:00, 15:30→16:00, 17:30→18:00, 19:30→20:00 UTC
    # Extra slot at 15:00 UTC (10:00 AM CDT) catches a missed 8:30 AM open within 90 min.
    - cron: '0 14,15,16,18,20 * * 1-5'
  workflow_dispatch:

jobs:
  watch-premarket:
    # Only meaningful at 12:30 UTC — skip this job at the trading-slot times
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(github.event.schedule, '0 13'))
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Check and rescue Pre-Market Screener
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone, timedelta
          from urllib import request, parse

          REPO  = os.environ["GITHUB_REPOSITORY"]
          TOKEN = os.environ["GITHUB_TOKEN"]
          T_TOK = os.environ.get("TELEGRAM_TOKEN", "")
          T_CID = os.environ.get("TELEGRAM_CHAT_ID", "")

          def gh(method, path, body=None):
              url = f"https://api.github.com/repos/{REPO}/{path}"
              data = json.dumps(body).encode() if body else None
              req = request.Request(url, data=data, method=method, headers={
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              })
              with request.urlopen(req) as r:
                  return json.loads(r.read()) if r.status not in (201, 204) else {}

          def telegram(text):
              if not T_TOK or not T_CID:
                  return
              data = parse.urlencode({"chat_id": T_CID, "parse_mode": "HTML", "text": text}).encode()
              try:
                  request.urlopen(f"https://api.telegram.org/bot{T_TOK}/sendMessage", data=data, timeout=5)
              except Exception:
                  pass

          cutoff = datetime.now(timezone.utc) - timedelta(minutes=120)
          runs_data = gh("GET", "actions/workflows/premarket.yml/runs?per_page=10")
          recent = [
              r for r in runs_data.get("workflow_runs", [])
              if datetime.fromisoformat(r["created_at"].replace("Z", "+00:00")) > cutoff
          ]

          now_et = datetime.now(timezone(timedelta(hours=-5))).strftime("%H:%M CDT")
          print(f"Pre-Market Screener runs in last 75 min: {len(recent)}", flush=True)

          if recent:
              run = recent[0]
              print(f"Run found: {run['status']} ({run['created_at']}) — no action needed.", flush=True)
          else:
              print("No recent run found — force-starting premarket.yml via workflow_dispatch.", flush=True)
              gh("POST", "actions/workflows/premarket.yml/dispatches", {"ref": "main"})
              print("workflow_dispatch triggered.", flush=True)
              telegram(
                  f"🔄 <b>Watchdog rescued Pre-Market Screener</b> — scheduled slot was missed, "
                  f"force-started at {now_et}."
              )
          PYEOF

  watch-trading-bot:
    # Only meaningful at the trading-slot watchdog times — skip at 12:30 UTC
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && !contains(github.event.schedule, '30 12'))
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Check and rescue Trading Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone, timedelta
          from urllib import request, parse

          REPO  = os.environ["GITHUB_REPOSITORY"]
          TOKEN = os.environ["GITHUB_TOKEN"]
          T_TOK = os.environ.get("TELEGRAM_TOKEN", "")
          T_CID = os.environ.get("TELEGRAM_CHAT_ID", "")

          def gh(method, path, body=None):
              url = f"https://api.github.com/repos/{REPO}/{path}"
              data = json.dumps(body).encode() if body else None
              req = request.Request(url, data=data, method=method, headers={
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              })
              with request.urlopen(req) as r:
                  return json.loads(r.read()) if r.status not in (201, 204) else {}

          def telegram(text):
              if not T_TOK or not T_CID:
                  return
              data = parse.urlencode({"chat_id": T_CID, "parse_mode": "HTML", "text": text}).encode()
              try:
                  request.urlopen(f"https://api.telegram.org/bot{T_TOK}/sendMessage", data=data, timeout=5)
              except Exception:
                  pass

          cutoff = datetime.now(timezone.utc) - timedelta(minutes=75)
          runs_data = gh("GET", "actions/workflows/trade.yml/runs?per_page=10")
          recent = [
              r for r in runs_data.get("workflow_runs", [])
              if datetime.fromisoformat(r["created_at"].replace("Z", "+00:00")) > cutoff
          ]

          now_et = datetime.now(timezone(timedelta(hours=-5))).strftime("%H:%M CDT")
          print(f"Trading Bot runs in last 75 min: {len(recent)}", flush=True)

          if recent:
              run = recent[0]
              print(f"Run found: {run['status']} ({run['created_at']}) — no action needed.", flush=True)
          else:
              print("No recent run found — force-starting trade.yml via workflow_dispatch.", flush=True)
              gh("POST", "actions/workflows/trade.yml/dispatches", {"ref": "main"})
              print("workflow_dispatch triggered.", flush=True)
              telegram(
                  f"🔄 <b>Watchdog rescued Trading Bot</b> — scheduled slot was missed, "
                  f"force-started at {now_et}."
              )
          PYEOF
