name: Trading Bot Watchdog

on:
  schedule:
    # Fires 30 min after each trading slot (Mon-Fri, market hours ET)
    # Slot → Watchdog: 13:30→14:00, 15:30→16:00, 17:30→18:00, 19:30→20:00 UTC
    # Extra slot at 15:00 UTC catches a missed 8:30 AM open within 90 min.
    - cron: '0 14,15,16,18,20 * * 1-5'
  workflow_dispatch:

jobs:
  watch-trading-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space /run/cron and alert if down
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python3 - <<'PYEOF'
          import os
          from urllib import request, parse
          from datetime import datetime, timezone, timedelta

          T_TOK  = os.environ.get("TELEGRAM_TOKEN", "")
          T_CID  = os.environ.get("TELEGRAM_CHAT_ID", "")
          HF_SID = os.environ.get("HF_SPACE_ID", "")

          def telegram(text):
              if not T_TOK or not T_CID:
                  return
              data = parse.urlencode({"chat_id": T_CID, "parse_mode": "HTML", "text": text}).encode()
              try:
                  request.urlopen(
                      f"https://api.telegram.org/bot{T_TOK}/sendMessage", data=data, timeout=5
                  )
              except Exception:
                  pass

          if not HF_SID:
              print("HF_SPACE_ID not set — skipping health check")
              exit(0)

          # HF_SPACE_ID format: "owner/space-name" → "owner-space-name.hf.space"
          slug = HF_SID.replace("/", "-")
          url  = f"https://{slug}.hf.space/run/cron"
          now_et = datetime.now(timezone(timedelta(hours=-5))).strftime("%H:%M CDT")

          try:
              with request.urlopen(request.Request(url, method="GET"), timeout=30) as r:
                  body = r.read().decode()
              if '"accepted"' in body:
                  print(f"HF Space healthy — /run/cron responded at {now_et}")
              else:
                  print(f"Unexpected response: {body[:120]}")
                  telegram(
                      f"⚠️ <b>Watchdog</b> — /run/cron gave unexpected response at {now_et}: "
                      f"<code>{body[:120]}</code>"
                  )
          except Exception as exc:
              print(f"/run/cron unreachable at {now_et}: {exc}")
              telegram(
                  f"🔴 <b>Watchdog alert</b> — HF Space /run/cron unreachable at {now_et}. "
                  f"Dispatcher may be down. Check: {url}"
              )
          PYEOF
