name: Pre-Market Screener

on:
  schedule:
    # Two triggers give GitHub two chances to fire before market open.
    # GitHub cron is best-effort and frequently delayed 30–60+ min.
    # 11:30 UTC = 6:30 AM CDT / 7:30 AM EDT — 2h before market open (early slot)
    # 12:00 UTC = 7:00 AM CDT / 8:00 AM EDT — 90 min before market open (main slot)
    # The screener is idempotent: the universe cache key is today's date, so
    # whichever trigger fires first populates the cache and the second is a no-op.
    - cron: '30 11 * * 1-5'
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Get today's date (cache key)
        id: date
        run: echo "today=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      # Check cache FIRST — if today's universe already exists (e.g. watchdog re-trigger),
      # skip Python setup, dep install, and the screener entirely.
      - name: Check / populate screened universe cache
        id: cache-universe
        uses: actions/cache@v4
        with:
          path: data/universe_today.json
          key: universe-${{ steps.date.outputs.today }}

      - name: Set up Python
        if: steps.cache-universe.outputs.cache-hit != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        if: steps.cache-universe.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      - name: Run screener
        if: steps.cache-universe.outputs.cache-hit != 'true'
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p data
          python scripts/screen_universe.py --max 25 --max-per-sector 3

      - name: Verify screener output
        if: steps.cache-universe.outputs.cache-hit != 'true'
        run: |
          if [ -f data/universe_today.json ]; then
            python3 -c "
          import json
          d = json.load(open('data/universe_today.json'))
          syms = d.get('symbols', d) if isinstance(d, dict) else d
          print(f'Screened {len(syms)} symbols: {syms}')
          "
          else
            echo "universe_today.json not created — screener may have failed"
            exit 1
          fi

      - name: Notify via Telegram
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping."
          else
            if [ "${{ steps.cache-universe.outputs.cache-hit }}" = "true" ]; then
              MSG="📋 <b>Pre-market screener skipped</b> — universe already cached for today."
            else
              COUNT=$(python3 -c "
          import json
          d = json.load(open('data/universe_today.json'))
          syms = d.get('symbols', d) if isinstance(d, dict) else d
          print(len(syms))
          " 2>/dev/null || echo "?")
              NOW=$(TZ=America/Chicago date '+%H:%M CDT')
              MSG="📋 <b>Pre-market screen complete</b> — ${COUNT} symbols selected at ${NOW}. Ready for market open."
            fi
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              --data-urlencode text="${MSG}" \
              >/dev/null
          fi

      - name: Alert on screener failure
        if: failure()
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — cannot send failure alert."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode text="🔴 <b>Pre-Market Screener FAILED</b> — universe not built. Trading bot will screen inline at open. Logs: ${RUN_URL}" \
            >/dev/null
