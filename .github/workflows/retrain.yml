name: Weekly Model Retraining

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday 2am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: retrain
  cancel-in-progress: false  # finish the running retrain rather than cancelling it

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest market data
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python scripts/download_data.py

      - name: Train model
        run: python scripts/train_model.py

      - name: Backtest quality gate
        continue-on-error: true   # informational during paper trading — don't block model push
        run: python scripts/backtest_gate.py

      - name: Model quality alert
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import json, os, sys
          from pathlib import Path
          report = Path('models/validation_report.json')
          if not report.exists():
              print('No validation report found — skipping quality alert.')
              sys.exit(0)
          r = json.loads(report.read_text())
          xgb_auc   = r.get('xgb_val_auc', 0)
          lstm_loss  = r.get('lstm_val_loss', 1)
          cutoff     = r.get('train_cutoff', '?')
          issues = []
          if lstm_loss  > 0.58: issues.append(f'LSTM val_loss={lstm_loss:.4f} (indeterminate — >0.58)')
          if xgb_auc    < 0.52: issues.append(f'XGB  val_auc={xgb_auc:.4f}  (near coin-flip — <0.52)')
          tok  = os.environ.get('TELEGRAM_TOKEN', '')
          chat = os.environ.get('TELEGRAM_CHAT_ID', '')
          if not tok or not chat:
              print('Telegram not configured — printing quality report to log only.')
              if issues:
                  print('MODEL QUALITY ISSUES: ' + ', '.join(issues))
              else:
                  print(f'Models OK — xgb_auc={xgb_auc:.4f} lstm_loss={lstm_loss:.4f} cutoff={cutoff}')
              sys.exit(0)
          import urllib.request, urllib.parse
          if issues:
              body = '⚠️ <b>Retrain complete — model quality issues</b>\n' + '\n'.join(f'• {i}' for i in issues)
              body += f'\nTrain cutoff: {cutoff}\nLSTM weight will be bypassed until fixed.'
          else:
              body = (f'✅ <b>Weekly retrain complete</b>\n'
                      f'XGB AUC: {xgb_auc:.4f}  LSTM loss: {lstm_loss:.4f}\n'
                      f'Train cutoff: {cutoff}')
          data = urllib.parse.urlencode({'chat_id': chat, 'parse_mode': 'HTML', 'text': body}).encode()
          urllib.request.urlopen(f'https://api.telegram.org/bot{tok}/sendMessage', data)
          print('Quality alert sent.')
          "

      - name: Push model to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: python scripts/save_model_hf.py

      - name: Pull trade database from HuggingFace
        if: always()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          python -c "
          import os, shutil
          token = os.environ.get('HF_TOKEN', '')
          repo = os.environ.get('HF_REPO_ID', '')
          if not token or not repo:
              print('HF secrets not set — skipping pull')
          else:
              from huggingface_hub import hf_hub_download
              cached = hf_hub_download(repo_id=repo, filename='trades.db', token=token, force_download=True)
              shutil.copy(cached, 'trades.db')
              print('trades.db pulled from HuggingFace')
          "

      - name: Send weekly report
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/weekly_report.py
