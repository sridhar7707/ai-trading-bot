name: Weekly Model Retraining

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday 2am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest market data
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python scripts/download_data.py

      - name: Train model
        run: python scripts/train_model.py

      - name: Backtest quality gate
        run: python scripts/backtest_gate.py

      - name: Push model to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: python scripts/save_model_hf.py

      - name: Restore trade database for weekly report
        if: always()
        uses: actions/cache/restore@v4
        with:
          path: trades.db
          key: trades-db-${{ github.run_id }}
          restore-keys: trades-db-

      - name: Send weekly report
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/weekly_report.py
