name: Keep-Alive & Trade Dispatch

on:
  # Triggered by cron-job.org at 8:15 AM CDT Mon-Fri
  # (GitHub's built-in scheduler was too unreliable — replaced with external cron)
  workflow_dispatch:

jobs:
  dispatch-and-ping:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch trade.yml (weekdays only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if it's a weekday (1=Mon … 5=Fri in UTC)
          DAY=$(date -u +%u)
          if [ "$DAY" -ge 1 ] && [ "$DAY" -le 5 ]; then
            echo "Weekday — dispatching trade.yml"
            curl -s -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/trade.yml/dispatches" \
              -d '{"ref":"main"}' \
              && echo "trade.yml dispatch triggered." \
              || echo "Dispatch failed — trade.yml will rely on its own cron."
          else
            echo "Weekend — skipping trade dispatch."
          fi

      - name: Ping HuggingFace Space
        env:
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          if [ -z "$HF_REPO_ID" ]; then
            echo "HF_REPO_ID not set — skipping ping."
            exit 0
          fi
          SPACE_URL="https://huggingface.co/spaces/${HF_REPO_ID}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$SPACE_URL")
          echo "Pinged ${SPACE_URL} — HTTP ${HTTP}"
