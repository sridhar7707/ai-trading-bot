name: Keep-Alive & Trade Dispatch

on:
  schedule:
    # Runs every weekday at 13:15 UTC (8:15 AM CDT / 9:15 AM EDT)
    # — 15 min before market open. Dispatches trade.yml so the bot starts
    # even if GitHub's cron scheduler delays or skips trade.yml itself.
    # Also runs daily at noon UTC (all days) to keep the HF Space awake.
    - cron: '15 13 * * 1-5'   # weekdays: dispatch trade + ping Space
    - cron: '0 12 * * 0,6'    # weekends: ping Space only
  workflow_dispatch:

jobs:
  dispatch-and-ping:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch trade.yml (weekdays only)
        # Only dispatch on weekdays — the cron already restricts this but
        # workflow_dispatch could be used on weekends too, so guard here.
        if: github.event_name == 'workflow_dispatch' || contains('1,2,3,4,5', format('{0}', github.event.schedule != '' && 1 || 0))
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if it's a weekday (1=Mon … 5=Fri in UTC)
          DAY=$(date -u +%u)
          if [ "$DAY" -ge 1 ] && [ "$DAY" -le 5 ]; then
            echo "Weekday — dispatching trade.yml"
            curl -s -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/trade.yml/dispatches" \
              -d '{"ref":"main"}' \
              && echo "trade.yml dispatch triggered." \
              || echo "Dispatch failed — trade.yml will rely on its own cron."
          else
            echo "Weekend — skipping trade dispatch."
          fi

      - name: Ping HuggingFace Space
        env:
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          if [ -z "$HF_REPO_ID" ]; then
            echo "HF_REPO_ID not set — skipping ping."
            exit 0
          fi
          SPACE_URL="https://huggingface.co/spaces/${HF_REPO_ID}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$SPACE_URL")
          echo "Pinged ${SPACE_URL} — HTTP ${HTTP}"
